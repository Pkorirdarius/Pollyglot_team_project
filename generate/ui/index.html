<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polyglot AI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0f0f0f;
    --surface: #1a1a1a;
    --border:  #2a2a2a;
    --text:    #e8e8e8;
    --muted:   #666;
    --accent:  #5b8dee;
    --user-bg: #1e2a3a;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; line-height: 1.65; }
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 740px; margin: 0 auto; }

  #thread { flex: 1; overflow-y: auto; padding: 32px 24px 16px; display: flex; flex-direction: column; gap: 28px; scroll-behavior: smooth; }
  #thread::-webkit-scrollbar { width: 4px; }
  #thread::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 14px; animation: fadeUp .25s ease both; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:500; flex-shrink:0; margin-top:2px; }
  .avatar.ai   { background: var(--accent); color:#fff; }
  .avatar.user { background:#2e2e2e; color:var(--muted); }

  .bubble { max-width:82%; padding:12px 16px; border-radius:14px; font-size:14.5px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
  .ai   .bubble { background:var(--surface); border:1px solid var(--border); border-radius:4px 14px 14px 14px; }
  .user .bubble { background:var(--user-bg); border:1px solid #263042; border-radius:14px 4px 14px 14px; }

  .dots span { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--muted); margin:0 2px; animation:blink 1.2s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay:.2s; }
  .dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.8);} 40%{opacity:1;transform:scale(1);} }

  #bar { padding:16px 24px 24px; background:var(--bg); }
  #input-wrap { display:flex; align-items:flex-end; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:10px 10px 10px 16px; transition:border-color .15s; }
  #input-wrap:focus-within { border-color:#3d5a99; }
  textarea { flex:1; background:none; border:none; outline:none; resize:none; font:inherit; font-size:14.5px; color:var(--text); line-height:1.6; max-height:160px; overflow-y:auto; }
  textarea::placeholder { color:var(--muted); }
  textarea::-webkit-scrollbar { width:3px; }
  textarea::-webkit-scrollbar-thumb { background:var(--border); }

  #send-btn { width:34px; height:34px; flex-shrink:0; background:var(--accent); border:none; border-radius:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s, opacity .15s; }
  #send-btn:hover { background:#7aa0f5; }
  #send-btn:disabled { opacity:.35; cursor:default; }
  #send-btn svg { width:16px; height:16px; fill:#fff; }
  #hint { text-align:center; font-size:11.5px; color:#444; margin-top:10px; }

  #empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); text-align:center; padding-bottom:60px; }
  #empty p { font-size:22px; font-weight:300; color:#555; }
  #empty span { font-size:13px; }
</style>
</head>
<body>
<div id="app">
  <div id="thread">
    <div id="empty">
      <p>Polyglot AI</p>
      <span>Ask anything about languages.</span>
    </div>
  </div>
  <div id="bar">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="Message Polyglot AI…"></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div id="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>
<script>
  const thread  = document.getElementById('thread');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');

  const RESPONSES = [
    { match: /\b(il est|c'est|cest)\b/i,
      text: "Great question! In French:\n\n**c'est** — use when followed by an article + noun:\n*C'est un médecin.*\n\n**il est** — use when the noun stands alone as a profession or nationality:\n*Il est médecin.*\n\nAdd any modifier → switch to c'est." },
    { match: /\b(subjunctive|subjonctif)\b/i,
      text: "The subjunctive (*subjonctif*) expresses doubt, necessity, or emotion. Triggered after verbs like *vouloir que*, *il faut que*, *bien que*.\n\nExample: *Il faut que tu viennes.* (You need to come.)" },
    { match: /\b(passé composé|imparfait|past tense)\b/i,
      text: "Both describe the past but differently:\n\n**Imparfait** — background states, ongoing actions: *Je mangeais quand…*\n**Passé composé** — completed events: *…il est arrivé.*\n\nImparfait sets the scene. Passé composé is the action." },
    { match: /\b(bonjour|salut|hello|hi|hey)\b/i,
      text: "Bonjour ! Ask me about any grammar point, vocabulary, or share a sentence you'd like me to correct." },
  ];

  function getReply(text) {
    for (const r of RESPONSES) if (r.match.test(text)) return r.text;
    return "That's interesting — could you share a bit more context? Which language are you working on, and what specifically is tripping you up?";
  }

  function renderMd(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function addMsg(role, html) {
    document.getElementById('empty')?.remove();
    const row = document.createElement('div');
    row.className = `msg ${role}`;
    row.innerHTML = `<div class="avatar ${role}">${role === 'ai' ? 'AI' : 'You'}</div><div class="bubble">${html}</div>`;
    thread.appendChild(row);
    thread.scrollTop = thread.scrollHeight;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg ai'; row.id = 'typing';
    row.innerHTML = `<div class="avatar ai">AI</div><div class="bubble dots"><span></span><span></span><span></span></div>`;
    thread.appendChild(row);
    thread.scrollTop = thread.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; resize(); sendBtn.disabled = true;
    addMsg('user', renderMd(text));
    addTyping();
    await new Promise(r => setTimeout(r, 700 + Math.random() * 600));
    document.getElementById('typing')?.remove();
    addMsg('ai', renderMd(getReply(text)));
    sendBtn.disabled = false; input.focus();
  }

  function resize() { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 160) + 'px'; }

  input.addEventListener('input', () => { resize(); sendBtn.disabled = !input.value.trim(); });
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); } });
  sendBtn.addEventListener('click', send);
</script>
</body>
</html>
